app:
  mode: 'production'
  database:
    movies:
      url: jdbc:postgresql://localhost:5432/${MOVIES_DB_NAME}
      username: ${SA_USERNAME}
      password: ${SA_PASSWORD}

quarkus:
  datasource:
    movies:
      db-kind: pg
      jdbc:
        url: ${app.database.movies.url}
      username: ${app.database.movies.username}
      password: ${app.database.movies.password}
  hibernate-orm:
    movies:
      datasource: movies
      packages: hrytsenko
    mapping:
      format:
        global: ignore
