name: quarkus-json-data

services:
  movies:
    container_name: movies
    image: hrytsenko/movies
    ports:
      - '8080:8080'
    env_file:
      - .env
    environment:
      APP_DATABASE_MOVIES_URL: jdbc:postgresql://pg:5432/${MOVIES_DB_NAME}
      APP_DATABASE_MOVIES_USERNAME: ${SA_USERNAME}
      APP_DATABASE_MOVIES_PASSWORD: ${SA_PASSWORD}
    depends_on:
      pg-init:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: Dockerfile
  movies-health:
    container_name: movies-health
    image: curlimages/curl
    command: [ 'sh', '-c', 'while true; do sleep 2000; done' ]
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -sSf http://movies:8080/q/health/ready' ]
      interval: 2s
      start_period: 3s
    depends_on:
      movies:
        condition: service_started
  pg:
    container_name: pg
    image: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${MOVIES_DB_NAME}
      POSTGRES_USER: ${SA_USERNAME}
      POSTGRES_PASSWORD: ${SA_PASSWORD}
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', "pg_isready -d ${MOVIES_DB_NAME} -U ${SA_USERNAME}" ]
      interval: 2s
      start_period: 3s
  pg-init:
    container_name: pg-init
    image: flyway/flyway
    env_file:
      - .env
    environment:
      MOVIES_DB_URL: jdbc:postgresql://pg:5432/${MOVIES_DB_NAME}
      MOVIES_DB_USERNAME: ${SA_USERNAME}
      MOVIES_DB_PASSWORD: ${SA_PASSWORD}
    volumes:
      - ./flyway.toml:/flyway/flyway.toml:ro
      - ./migrations:/flyway/migrations:ro
    command: -configFiles=/flyway/flyway.toml migrate -environment=docker -locations=filesystem:/flyway/migrations
    depends_on:
      pg:
        condition: service_healthy
  pg-rest:
    container_name: pg-rest
    image: postgrest/postgrest
    env_file:
      - .env
    environment:
      PGRST_DB_URI: postgres://${SA_USERNAME}:${SA_PASSWORD}@pg:5432/${MOVIES_DB_NAME}
      PGRST_DB_ANON_ROLE: ${SA_USERNAME}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:3000
    ports:
      - '15432:3000'
    depends_on:
      pg-init:
        condition: service_completed_successfully
  pg-ui:
    container_name: pg-ui
    image: dpage/pgadmin4
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${SA_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${SA_PASSWORD}
    ports:
      - '16432:80'
    volumes:
      - ./pgadmin.json:/pgadmin4/servers.json:ro
    depends_on:
      pg-init:
        condition: service_completed_successfully
